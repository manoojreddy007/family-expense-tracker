<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="mb-4 text-center">Edit Transaction</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="container mt-3">
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                  {{ message }}
                  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label" for="name">Name</label>
                <input type="text" name="name" id="name" class="form-control" required value="{{ transaction.name or '' }}">
            </div>
            <div class="mb-3">
                <label class="form-label" for="amount">Amount</label>
                <input type="number" step="0.01" min="0.01" name="amount" id="amount" class="form-control" required value="{{ transaction.amount }}">
            </div>
            <div class="mb-3">
                <label class="form-label" for="category">Category</label>
                <select name="category" id="category" class="form-select" required>
                    {% for category in categories %}
                    <option {% if transaction.category == category %}selected{% endif %}>{{ category }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="type">Type</label>
                <select name="type" id="type" class="form-select" required>
                    {% for transaction_type in transaction_types %}
                    <option {% if transaction.type == transaction_type %}selected{% endif %}>{{ transaction_type }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="date">Date</label>
                <input type="date" name="date" id="date" class="form-control" required value="{{ transaction.date }}">
            </div>
            <div class="mb-3">
                <label class="form-label" for="added_by">Added By</label>
                <select name="added_by" id="added_by" class="form-select" required>
                    {% for person in people %}
                    <option {% if transaction.added_by == person %}selected{% endif %}>{{ person }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label" for="notes">Notes</label>
                <textarea name="notes" id="notes" class="form-control" maxlength="200" rows="3">{{ transaction.notes or '' }}</textarea>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary w-100" type="submit">Update Transaction</button>
                <a href="/" class="btn btn-secondary w-100" role="button">Cancel</a>
            </div>
        </form>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
